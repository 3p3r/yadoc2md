name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run unit tests
        run: cargo test

      - name: Run coverage
        run: ./coverage.sh

      - name: Run smoke tests
        run: ./smoke.sh

  docker-image:
    name: Build cross-compile image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Dockerfile.build
        run: docker build -f docker/Dockerfile.build -t yadoc2md-build:ci .

  cross-compile:
    name: Cross-compile (${{ matrix.name }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docker-image
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            target: x86_64-unknown-linux-gnu
            binary: yadoc2md-linux-x64
            use_zigbuild: true
          - name: Linux ARM64
            target: aarch64-unknown-linux-gnu
            binary: yadoc2md-linux-arm64
            use_zigbuild: true
          - name: Linux musl x64
            target: x86_64-unknown-linux-musl
            binary: yadoc2md-linux-musl-x64
            use_zigbuild: true
          - name: Linux musl ARM64
            target: aarch64-unknown-linux-musl
            binary: yadoc2md-linux-musl-arm64
            use_zigbuild: true
          - name: macOS x64
            target: x86_64-apple-darwin
            binary: yadoc2md-darwin-x64
            use_zigbuild: true
          - name: macOS ARM64
            target: aarch64-apple-darwin
            binary: yadoc2md-darwin-arm64
            use_zigbuild: true
          - name: Windows x64
            target: x86_64-pc-windows-gnu
            binary: yadoc2md-win32-x64.exe
            use_zigbuild: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Dockerfile.build
        run: docker build -f docker/Dockerfile.build -t yadoc2md-build:ci .

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: .cargo-home
          key: cross-cargo-v2-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cross-cargo-v2-${{ matrix.target }}-

      - name: Cache cross-target build dir
        uses: actions/cache@v4
        with:
          path: cross-target/${{ matrix.target }}
          key: cross-target-v2-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cross-target-v2-${{ matrix.target }}-

      - name: Cross-compile release binary
        run: |
          TARGET_DIR="cross-target/${{ matrix.target }}"
          if [[ "${{ matrix.use_zigbuild }}" == "true" ]]; then
            BUILD_CMD="cargo zigbuild --release --target ${{ matrix.target }}"
          else
            BUILD_CMD="cargo build --release --target ${{ matrix.target }}"
          fi
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/build" -w /build \
            -e CARGO_HOME=/build/.cargo-home \
            -e CARGO_TARGET_DIR="/build/${TARGET_DIR}" \
            yadoc2md-build:ci -c "rustup target add ${{ matrix.target }} && ${BUILD_CMD}"

      - name: Copy binary to artifacts
        run: |
          mkdir -p artifacts
          TARGET_DIR="cross-target/${{ matrix.target }}"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp "${TARGET_DIR}/release/yadoc2md.exe" "artifacts/${{ matrix.binary }}"
          else
            cp "${TARGET_DIR}/release/yadoc2md" "artifacts/${{ matrix.binary }}"
            chmod +x "artifacts/${{ matrix.binary }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: artifacts/${{ matrix.binary }}
          retention-days: 7

  nightly-release:
    name: Nightly release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: cross-compile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Prepare dist directory
        run: |
          mkdir -p dist
          find artifacts -type f \( -name 'yadoc2md-*' -o -name 'yadoc2md-*.exe' \) -exec cp {} dist/ \;
          chmod +x dist/yadoc2md-* 2>/dev/null || true
          echo "Binaries in dist/:"
          ls -la dist/

      - name: Verify all binaries exist
        run: |
          EXPECTED_BINARIES=(
            yadoc2md-linux-x64
            yadoc2md-linux-arm64
            yadoc2md-linux-musl-x64
            yadoc2md-linux-musl-arm64
            yadoc2md-darwin-x64
            yadoc2md-darwin-arm64
            yadoc2md-win32-x64.exe
          )
          MIN_SIZE=100000
          ERRORS=0
          for binary in "${EXPECTED_BINARIES[@]}"; do
            if [ ! -f "dist/$binary" ]; then
              echo "ERROR: Missing dist/$binary"
              ERRORS=$((ERRORS + 1))
            else
              SIZE=$(stat -c%s "dist/$binary")
              if [ "$SIZE" -lt "$MIN_SIZE" ]; then
                echo "ERROR: dist/$binary is too small ($SIZE bytes, expected >= $MIN_SIZE)"
                ERRORS=$((ERRORS + 1))
              else
                echo "OK: dist/$binary ($SIZE bytes)"
              fi
            fi
          done
          if [ "$ERRORS" -gt 0 ]; then
            echo "Error: $ERRORS binary issues found"
            exit 1
          fi
          echo "All 7 platform binaries present and valid"

      - name: Create or update nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=nightly
          NOTES="Automated build from ${{ github.sha }} on main."
          if gh release view "$TAG" &>/dev/null; then
            echo "Updating existing nightly release..."
            gh release upload "$TAG" dist/* --clobber
          else
            echo "Creating nightly release..."
            gh release create "$TAG" dist/* \
              --title "Nightly" \
              --prerelease \
              --notes "$NOTES"
          fi
